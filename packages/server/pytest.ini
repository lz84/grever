[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers -p no:randomly
asyncio_mode = auto
# Default timeout for slow tests
timeout = 30
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    smoke: smoke test - all endpoints no 500
    integration: integration tests requiring DB
    e2e: end-to-end tests
    unit: unit tests
