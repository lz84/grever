# This workflow will install Python dependencies, run tests and linting

name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run mypy
      run: |
        mypy src/reins --config-file .mypy.ini

    - name: Run flake8
      run: |
        flake8 src/reins --config-file .flake8

    - name: Run isort
      run: |
        isort --check-only src/reins

    - name: Run bandit
      run: |
        bandit -f json -f console -r src/reins > bandit-report.json

    - name: Run pylint
      run: |
        pylint src/reins --config-file .pylintrc

    - name: Run tests
      run: |
        pytest tests/ --cov=src/reins --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Run pre-commit
      run: |
        pre-commit run --all-files

    - name: Check for security vulnerabilities
      run: |
        pip install safety
        safety check --full-report

    - name: Check for outdated dependencies
      run: |
        pip install pip-check
        pip-check

    - name: Check for license compliance
      run: |
        pip install license-checker
        license-checker --production

    - name: Check for unused dependencies
      run: |
        pip install pipdeptree
        pipdeptree --packages=pytest,flake8,isort,bandit,pylint,codecov,pre-commit,safety,license-checker,python-dotenv,pydantic,fastapi,uvicorn,sqlalchemy,httpx,python-jose,passlib,python-telegram-bot,jinja2,aiofiles,asyncio,python-multipart

    - name: Check for vulnerable dependencies
      run: |
        pip install pip-audit
        pip-audit

    - name: Check for outdated dependencies
      run: |
        pip install pip-audit
        pip-audit --check

    - name: Check for license compliance
      run: |
        pip install license-checker
        license-checker --production

    - name: Check for unused dependencies
      run: |
        pip install pipdeptree
        pipdeptree --packages=pytest,flake8,isort,bandit,pylint,codecov,pre-commit,safety,license-checker,python-dotenv,pydantic,fastapi,uvicorn,sqlalchemy,httpx,python-jose,passlib,python-telegram-bot,jinja2,aiofiles,asyncio,python-multipart

