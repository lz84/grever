version: '3.8'

services:
  nexus-backend:
    build: .
    container_name: nexus-backend
    ports:
      - "8090:8090"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - DATABASE_URL=sqlite:///app/data/reins.db
      - LOG_LEVEL=INFO
      - ENVIRONMENT=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nexus-frontend:
    build: .
    container_name: nexus-frontend
    ports:
      - "3000:3000"
    depends_on:
      - nexus-backend
    environment:
      - REACT_APP_API_URL=http://localhost:8090
      - NODE_ENV=production
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nexus-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - nexus-backend
      - nexus-frontend
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: nexus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

volumes:
  redis_data: